<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Lucky Draw Coupon Generator</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
		rel="stylesheet">
	<style>
		* {
			box-sizing: border-box
		}

		body {
			margin: 0;
			font-family: "Inter", Arial, sans-serif;
			background: #f3f4f6;
			font-optical-sizing: auto;
			font-style: normal;
			color: #111827
		}

		.wrap {
			max-width: 1180px;
			margin: 32px auto;
			padding: 0 20px
		}

		.card {
			background: #fff;
			border-radius: 16px;
			padding: 22px;
			box-shadow: 0 10px 30px #00000012
		}

		h1 {
			margin: 0 0 6px;
			font-size: 28px
		}

		.sub {
			margin: 0 0 22px;
			color: #6b7280
		}

		.form {
			display: grid;
			grid-template-columns: 1.4fr 1fr 1fr auto;
			gap: 12px;
			align-items: end
		}

		label {
			display: block;
			font-size: 13px;
			font-weight: 700;
			margin-bottom: 7px
		}

		.field input {
			width: 100%;
			height: 44px;
			border: 1px solid #d1d5db;
			border-radius: 9px;
			padding: 0 12px;
			font-size: 16px
		}

		button {
			height: 44px;
			border: 0;
			border-radius: 9px;
			padding: 0 18px;
			font-weight: 700;
			cursor: pointer
		}

		.primary {
			background: #111827;
			color: #fff
		}

		.secondary {
			background: #e5e7eb;
			color: #111827
		}

		.actions {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			margin-top: 16px
		}

		.status {
			margin-top: 14px;
			color: #4b5563;
			font-size: 14px
		}

		.preview-title {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-top: 24px
		}

		.preview {
			margin-top: 10px;
			border: 1px solid #e5e7eb;
			border-radius: 12px;
			overflow: auto;
			background: #ddd
		}

		.preview svg {
			display: block;
			width: 100%;
			height: auto
		}

		.hint {
			font-size: 12px;
			color: #6b7280
		}

		@media(max-width:800px) {
			.form {
				grid-template-columns: 1fr
			}

			.primary {
				width: 100%
			}
		}

		@media print {
			body {
				background: #fff
			}

			.wrap,
			.card {
				margin: 0;
				padding: 0;
				max-width: none;
				box-shadow: none
			}

			.controls,
			.preview-title,
			.status {
				display: none !important
			}

			.preview {
				border: 0;
				margin: 0;
				overflow: visible
			}

			.preview svg {
				width: 100%;
				height: auto;
				page-break-after: always
			}
		}

		#loadingOverlay {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, .65);
			display: none;
			justify-content: center;
			align-items: center;
			z-index: 999999;
		}

		.loading-box {
			width: 420px;
			max-width: 90%;
			background: #fff;
			border-radius: 12px;
			padding: 30px;
			text-align: center;
			box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
		}

		.spinner {
			width: 55px;
			height: 55px;
			margin: 0 auto 20px;
			border: 6px solid #ddd;
			border-top-color: #2871ff;
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		.progress-container {
			height: 10px;
			width: 100%;
			background: #eee;
			border-radius: 100px;
			overflow: hidden;
			margin: 20px 0;
		}

		#loadingBar {
			width: 0%;
			height: 100%;
			background: #2871ff;
			transition: width .2s;
		}

		#loadingText {
			margin-top: 10px;
			font-weight: 600;
		}
	</style>
</head>

<body>
	<div class="wrap">
		<div class="card">
			<div class="controls">
				<h1>Lucky Draw Coupon Generator</h1>
				<p class="sub">Generate numbered coupons from the uploaded SVG artwork.</p>
				<div class="form">
					<div class="field"><label for="pattern">Starting Pattern</label><input id="pattern" value="ARUN"
							placeholder="e.g. ARUN-"></div>
					<div class="field"><label for="start">Starting Number</label><input id="start" type="number" min="0"
							value="1"></div>
					<div class="field"><label for="end">Ending Number</label><input id="end" type="number" min="0"
							value="10"></div>
					<button class="primary" id="generate">Generate Coupons</button>
				</div>
				<div class="actions">
					<button class="primary" id="printPdf">Print / Save as PDF</button>
					<button class="secondary" style="display: none;" id="downloadSvg">Download Current SVG</button>
					<button class="secondary" id="downloadPng">Download Current PNG</button>
					<button class="secondary" id="downloadAllPng">Download All PNGs</button>
					<button class="primary" id="downloadPdf">Download as PDF</button>
					<button class="secondary" style="display: none;" id="downloadWord">Download as Word</button>
				</div>
				<div id="loadingOverlay">
					<div class="loading-box">
						<div class="spinner"></div>

						<h3 id="loadingTitle">Generating PDF...</h3>

						<div class="progress-container">
							<div id="loadingBar"></div>
						</div>

						<div id="loadingText">Preparing...</div>
					</div>
				</div>
				<div class="status" id="status">Ready.</div>
				<div id="progressContainer" style="display:none;margin-top:10px;">
					<progress id="progressBar" value="0" max="100" style="width:100%;height:18px;"></progress>
					<div id="progressText" style="margin-top:6px;font-size:14px;"></div>
				</div>
			</div>
			<div class="preview-title"><strong>Preview</strong><span class="hint">The same serial is printed after “No:”
					on both halves.</span></div>
			<div class="preview" id="preview"></div>
		</div>
	</div>

	<script>
		const overlay = document.getElementById("loadingOverlay");
		const loadingTitle = document.getElementById("loadingTitle");
		const loadingBar = document.getElementById("loadingBar");
		const loadingText = document.getElementById("loadingText");

		function showLoading(title) {

			loadingTitle.textContent = title;
			loadingBar.style.width = "0%";
			loadingText.textContent = "Preparing...";
			overlay.style.display = "flex";

		}

		function updateLoading(current, total, message = "Generating") {

			const percent = Math.round(current / total * 100);

			loadingBar.style.width = percent + "%";

			loadingText.textContent =
				`${message} ${current} / ${total} (${percent}%)`;

		}

		function hideLoading() {

			overlay.style.display = "none";

		}

		const template = document.getElementById('couponTemplate').content.querySelector('svg');
		const preview = document.getElementById('preview');
		let generated = [], currentIndex = 0;

		function svgSize(svg) {
			const vb = (svg.getAttribute('viewBox') || '0 0 2480 877').trim().split(/\s+/).map(Number);
			return { x: vb[0], y: vb[1], w: vb[2], h: vb[3] };
		}
		function addSerial(svg, serial) {
			const ns = 'http://www.w3.org/2000/svg', s = svgSize(svg);
			// Coordinates based on the marked positions in the supplied 2480×877 artwork.
			const points = [
				{ x: s.x + s.w * 0.135, y: s.y + s.h * 0.118, fill: '#111111' },
				{ x: s.x + s.w * 0.495, y: s.y + s.h * 0.118, fill: '#ffffff' }
			];
			points.forEach(p => {
				const t = document.createElementNS(ns, 'text');
				t.setAttribute('x', p.x); t.setAttribute('y', p.y);
				t.setAttribute('fill', p.fill); t.setAttribute('font-family', 'Inter, Helvetica, sans-serif');
				t.setAttribute('font-size', Math.max(22, s.h * 0.045)); t.setAttribute('font-weight', '700');
				t.setAttribute('text-anchor', 'middle');
				t.setAttribute('dominant-baseline', 'middle'); t.setAttribute('data-generated-serial', '1');
				t.textContent = serial; svg.appendChild(t);
			});
		}

		function serialFor(n, start, end, pattern) {
			const digits = Math.max(String(Math.abs(start)).length, String(Math.abs(end)).length, 4);
			return pattern + String(n).padStart(digits, '0');
		}
		function show(index) {
			currentIndex = index;
			preview.innerHTML = '';
			if (generated[index]) preview.appendChild(generated[index].cloneNode(true));
		}
		function generate() {
			const pattern = document.getElementById('pattern').value;
			const start = Number(document.getElementById('start').value);
			const end = Number(document.getElementById('end').value);
			if (!Number.isInteger(start) || !Number.isInteger(end) || end < start) { alert('Enter a valid range. Ending number must be greater than or equal to starting number.'); return }
			if (end - start + 1 > 5000 && !confirm(`This will generate ${end - start + 1} coupons and may use significant memory. Continue?`)) return;
			generated = [];
			for (let n = start; n <= end; n++) { const svg = template.cloneNode(true); addSerial(svg, serialFor(n, start, end, pattern)); generated.push(svg) }
			show(0);
			document.getElementById('status').textContent = `Generated ${generated.length} coupon(s): ${serialFor(start, start, end, pattern)} to ${serialFor(end, start, end, pattern)}.`;
		}
		function serialize(svg) { return new XMLSerializer().serializeToString(svg) }
		function download(blob, name) { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 1000) }
		document.getElementById('generate').onclick = generate;
		document.getElementById('downloadSvg').onclick = () => { if (!generated.length) return; download(new Blob([serialize(generated[currentIndex])], { type: 'image/svg+xml' }), 'coupon.svg') };
		document.getElementById('downloadPng').onclick = () => {
			if (!generated.length) return; const svg = generated[currentIndex], size = svgSize(svg), img = new Image();
			const url = URL.createObjectURL(new Blob([serialize(svg)], { type: 'image/svg+xml' }));
			img.onload = () => { const c = document.createElement('canvas'); c.width = size.w; c.height = size.h; const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0); URL.revokeObjectURL(url); c.toBlob(b => download(b, 'coupon.png'), 'image/png') }; img.src = url;
		};
		document.getElementById('printPdf').onclick = () => {
			if (!generated.length) generate(); if (!generated.length) return;
			const w = window.open('', '_blank'); const pages = generated.map(svg => `<div class="page">${serialize(svg)}</div>`).join('');
			w.document.write(`<!doctype html><html><head><title>Lucky Draw Coupons</title><style>@page{size:landscape;margin:0}html,body{margin:0}.page{/*page-break-after:always;*/width:100vw;height:auto;display:flex;align-items:center;justify-content:center;overflow:hidden; margin-bottom: 20px;}.page svg{max-width:100%;max-height:100%;width:100%;height:auto}.page:last-child{page-break-after:auto}</style></head><body>${pages}<script>window.onload=()=>setTimeout(()=>window.print(),400)<\/script></body></html>`);
			w.document.close();
		};
		generate();
	</script>
	<!-- GENERATE PNG ZIP -->
	<script>
		document.getElementById("downloadAllPng").addEventListener("click", downloadAllPNGs);

		async function downloadAllPNGs() {
			const progressContainer = document.getElementById("progressContainer");
			const progressBar = document.getElementById("progressBar");
			const progressText = document.getElementById("progressText");

			progressContainer.style.display = "block";

			if (!generated.length) generate();

			if (!generated.length) return;

			const zip = new JSZip();

			for (let i = 0; i < generated.length; i++) {
				const percent = Math.round(((i + 1) / generated.length) * 100);

				progressBar.value = percent;

				progressText.textContent = `Generating ${i + 1} of ${generated.length} (${percent}%)`;

				const svg = generated[i];

				const size = svgSize(svg);

				const svgString = serialize(svg);

				const url = URL.createObjectURL(
					new Blob([svgString], { type: "image/svg+xml" })
				);

				const img = new Image();

				await new Promise(resolve => {
					img.onload = resolve;
					img.src = url;
				});

				const canvas = document.createElement("canvas");
				canvas.width = size.w;
				canvas.height = size.h;

				const ctx = canvas.getContext("2d");
				ctx.drawImage(img, 0, 0);

				URL.revokeObjectURL(url);

				const blob = await new Promise(resolve =>
					canvas.toBlob(resolve, "image/png")
				);

				zip.file(`coupon-${i + 1}.png`, blob);
			}

			progressBar.value = 100;

			progressText.textContent = "Creating ZIP...";

			const content = await zip.generateAsync({ type: "blob" });

			download(content, "Coupons-PNG.zip");

			progressText.textContent = "✅ Done!";

			setTimeout(() => {
				progressContainer.style.display = "none";
			}, 2000);
		}
	</script>
	<!-- CONVERT PNG TO PDF OR DOC-->
	<script>
		document.getElementById("downloadPdf").onclick = async function () {

			if (!generated.length) generate();
			if (!generated.length) return;

			const { jsPDF } = window.jspdf;

			let pdf;
			showLoading("Generating PDF");
			for (let i = 0; i < generated.length; i++) {
				updateLoading(i + 1, generated.length);
				const svg = generated[i];
				const size = svgSize(svg);

				const svgText = serialize(svg);

				const img = new Image();

				const url = URL.createObjectURL(
					new Blob([svgText], {
						type: "image/svg+xml"
					})
				);

				await new Promise(resolve => {
					img.onload = resolve;
					img.src = url;
				});

				const canvas = document.createElement("canvas");
				canvas.width = size.w;
				canvas.height = size.h;

				//canvas.getContext("2d").drawImage(img, 0, 0);
				const ctx = canvas.getContext("2d");

				// Fill white background (required for JPEG)
				ctx.fillStyle = "#ffffff";
				ctx.fillRect(0, 0, canvas.width, canvas.height);
				// Draw SVG on top
				ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

				// Export as JPEG (quality 0.8)
				const jpg = canvas.toDataURL("image/jpeg", 0.8);

				// URL.revokeObjectURL(url);

				// const imageCanvas = canvas.toDataURL("image/jpeg", 0.8);

				if (!pdf) {
					pdf = new jsPDF({
						orientation: size.w > size.h ? "landscape" : "portrait",
						unit: "px",
						format: [size.w, size.h]
					});
				} else {
					pdf.addPage([size.w, size.h], size.w > size.h ? "landscape" : "portrait");
				}

				// pdf.addImage(imageCanvas, "JPEG", 0, 0, size.w, size.h);

				pdf.addImage(
					jpg,
					"JPEG",
					0,
					0,
					size.w,
					size.h,
					undefined,
					"FAST"
				);

				status.textContent =
					`Creating PDF ${i + 1}/${generated.length}`;

				if ((i + 1) % 10 === 0) {
					await new Promise(resolve => setTimeout(resolve, 0));
				}
			}
			loadingText.textContent = "Finalizing PDF...";
			loadingBar.style.width = "100%";
			pdf.save("Coupons.pdf");

			status.textContent = "PDF downloaded.";
			hideLoading();
		};
		// doc
		document.getElementById("downloadWord").onclick = async function () {

			if (!generated.length) generate();

			let html = "";

			for (const svg of generated) {

				html += `
            <div style="page-break-after:always">
                ${serialize(svg)}
            </div>
        `;
			}

			const blob = window.htmlDocx.asBlob(html);

			download(blob, "Coupons.doc");
		};
	</script>
